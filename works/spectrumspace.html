<!DOCTYPE html>
<html>
<head>
    <title>3D Desktop Audio Spectrum</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; }
        canvas { display: block; }

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        #controls label {
            display: block;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="controls">
        <label>Transparency Scale: <input type="range" id="transparencyScale"   min="0"  max="2"   step="0.01" value="0.286"></label>
        <label>Contrast:           <input type="range" id="contrast"            min="0.01" max="1" step="0.01" value="0.505"></label>
        <label>Bass Boost:         <input type="range" id="bassBoost"           min="-0.5" max="0.5" step="0.01" value="0"></label>
        <label>High Freq Boost:    <input type="range" id="highFreqBoost"       min="0"  max="2"   step="0.01" value="2"></label>
        <label>Brightness Power:   <input type="range" id="brightnessPower"     min="1"  max="3"   step="0.01" value="2"></label>
        <label>Z Amplitude:        <input type="range" id="zAmplitudeInfluence" min="0"  max="1"   step="0.01" value="0"></label>
        <label>Z Center (freq):    <input type="range" id="zCenter"             min="0"  max="1"   step="0.01" value="0.5"></label>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // ── 参数缓存（通过事件监听更新，避免每帧读取 DOM）──────────────────
        const params = {
            transparencyScale:    0.286,
            contrast:             0.505,  // 0.01~1，公式用 1/(1.01-contrast) 使右边=强对比
            bassBoost:            0,
            highFreqBoost:        2,
            brightnessPower:      2,
            zAmplitudeInfluence:  0,
            zCenter:              0.5,    // 0=最低频端, 1=最高频端
        };

        function setupParamListeners() {
            for (const key of Object.keys(params)) {
                const el = document.getElementById(key);
                if (!el) continue;
                el.addEventListener('input', () => {
                    params[key] = parseFloat(el.value);
                });
            }
        }

        // ── Audio ─────────────────────────────────────────────────────────────
        let analyser, dataArray, bufferLength;
        let logMin, logMax, logRange, maxFreq;

        function setupAudio(stream) {
            const audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 16384;

            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);

            bufferLength = analyser.frequencyBinCount;
            dataArray    = new Uint8Array(bufferLength);

            const minFreq = 20;
            maxFreq  = audioContext.sampleRate / 4;
            logMin   = Math.log2(minFreq);
            logMax   = Math.log2(maxFreq);
            logRange = logMax - logMin;
        }

        // ── Scene ─────────────────────────────────────────────────────────────
        const NUM_LINES  = 5000;
        const LINE_LENGTH = 1e4;

        let renderer, scene, camera, orbitControls, lines;

        function setupScene() {
            scene    = new THREE.Scene();
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            // 从 -Z 方向看，绕 Y 轴逆时针 20°，绕 X 轴逆时针 20°
            const rad20 = 20 * Math.PI / 180;
            camera.position.set(
                -500 * Math.sin(rad20),           //  x
                -500 * Math.sin(rad20),           //  y（垂直偏转）
                -500 * Math.cos(rad20) * Math.cos(rad20)  // z
            );
            camera.lookAt(0, 0, 0);

            orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping  = true;
            orbitControls.dampingFactor  = 0.05;
            orbitControls.screenSpacePanning = false;
            orbitControls.minDistance    = 100;
            orbitControls.maxDistance    = 1000;

            lines = [];
            const baseMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
            const baseVertices  = new Float32Array([-LINE_LENGTH / 2, 0, 0, LINE_LENGTH / 2, 0, 0]);

            for (let i = 0; i < NUM_LINES; i++) {
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(baseVertices.slice(), 3));
                const line = new THREE.Line(geometry, baseMaterial.clone());
                scene.add(line);
                lines.push(line);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ── Animate ───────────────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            analyser.getByteFrequencyData(dataArray);

            const { transparencyScale, contrast, bassBoost, highFreqBoost, brightnessPower, zAmplitudeInfluence, zCenter } = params;

            for (let i = 0; i < NUM_LINES; i++) {
                // 对数频率映射
                const logFreq  = logMin + (i / (NUM_LINES - 1)) * logRange;
                const freq     = Math.pow(2, logFreq);
                const binIndex = (freq / maxFreq) * (bufferLength / 2);
                const lo       = Math.floor(binIndex);
                const hi       = Math.min(lo + 1, bufferLength - 1);
                const frac     = binIndex - lo;

                // 线性插值幅度，归一化到 [0,1]
                let amp = (dataArray[lo] * (1 - frac) + dataArray[hi] * frac) / 255;

                // 频率因子（0 = 低频，1 = 高频）
                const freqFactor = (logFreq - logMin) / logRange;

                // 低频 / 高频 boost
                amp *= Math.pow(2, bassBoost    * (1 - freqFactor));
                amp *= Math.pow(2, highFreqBoost * freqFactor);

                // 对比度：滑块右边(contrast→1)=强对比，左边(→0.01)=弱对比
                amp  = Math.pow(amp, 1 / (1.01 - contrast));
                amp  = Math.pow(amp, brightnessPower);
                amp *= transparencyScale;

                const line = lines[i];
                line.material.opacity = Math.min(Math.max(amp, 0), 1);

                // 位置与旋转
                const octaves = logFreq - logMin;
                const angle   = octaves * Math.PI;
                const t       = i / (NUM_LINES - 1);          // 0~1，低频到高频
                const baseZ   = (t - zCenter) * 400;          // 以 zCenter 为原点展开
                // 向中心（0）收缩：baseZ * (1 - influence * amp)
                const zPos    = baseZ * (1 - zAmplitudeInfluence * amp);

                line.position.set(0, 0, zPos);
                line.rotation.z = angle;
            }

            orbitControls.update();
            renderer.render(scene, camera);
        }

        // ── Entry point ───────────────────────────────────────────────────────
        function main() {
            if (!navigator.mediaDevices?.getDisplayMedia) {
                alert('此浏览器不支持桌面音频捕获，请使用 Chrome 或 Edge。');
                return;
            }

            setupParamListeners();

            navigator.mediaDevices.getDisplayMedia({ audio: true, video: true })
                .then(stream => {
                    setupAudio(stream);
                    setupScene();
                    animate();
                })
                .catch(err => {
                    console.error('getDisplayMedia error:', err);
                    alert('无法捕获桌面音频：' + err.message);
                });
        }

        main();
    </script>
</body>
</html>
