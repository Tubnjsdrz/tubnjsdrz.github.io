	<h6></h6>
	<div id="navyears"></div>
	<div id="content"></div>
	
<script>
  // ── 自定义配置 ──────────────────────────────
  const navFile    = './navfrag.html';
  const defaultIndex = 1;  // 默认加载第几个（0开始）
  const contentFiles = [
    '/thoughts/fragments2026',
    '/thoughts/fragments2025',
    '/thoughts/fragments2024',
    '/thoughts/fragments2023',
    '/thoughts/fragments2022',
    '/thoughts/fragments2021',
    '/thoughts/fragments2020',
    '/thoughts/fragments2019',
  ];
  // ────────────────────────────────────────────

  function setActive(index) {
    document.querySelectorAll('#navyears .navfrag a').forEach((a, i) => {
      a.style.fontWeight = i === index ? 'bold' : 'normal';
    });
  }

  function loadContent(index) {
    fetch(contentFiles[index])
      .then(r => r.text())
      .then(html => {
        document.getElementById('content').innerHTML = html;
        setActive(index);
      });
  }

  function bindNav() {
    document.querySelectorAll('#navyears .navfrag a').forEach((a, i) => {
      a.style.cursor = 'pointer';
      a.addEventListener('click', () => loadContent(i));
    });
  }

  // 加载导航栏 → 绑定点击 → 加载默认内容 → 加粗默认项
  fetch(navFile)
    .then(r => r.text())
    .then(html => {
      document.getElementById('navyears').innerHTML = html;
      bindNav();
      loadContent(defaultIndex);
    });
</script>
  
</div>
