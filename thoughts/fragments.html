  <a>2026</a>

  <a>2023</a>
  <a>2022</a>
  <a>2021</a>
  <a>2020</a>
  <a>2019</a>
</div>

<div id="content"></div>

<script>
  // ── 自定义配置 ──────────────────────────────
  const defaultIndex = 0;
  const contentFiles = [
    '/thoughts/fragments2026',
    '/thoughts/fragments2025',
    '/thoughts/fragments2024',
    '/thoughts/fragments2023',
    '/thoughts/fragments2022',
    '/thoughts/fragments2021',
    '/thoughts/fragments2020',
    '/thoughts/fragments2019',
  ];
  // ────────────────────────────────────────────

  function setActive(index) {
    document.querySelectorAll('.navfrag a').forEach((a, i) => {
      a.style.fontWeight = i === index ? 'bold' : 'normal';
    });
  }

  function loadContent(index) {
    fetch(contentFiles[index])
      .then(r => r.text())
      .then(html => {
        document.getElementById('content').innerHTML = html;
        setActive(index);
      });
  }

  // 绑定点击
  document.querySelectorAll('.navfrag a').forEach((a, i) => {
    a.style.cursor = 'pointer';
    a.addEventListener('click', () => loadContent(i));
  });

  // 加载默认内容
  loadContent(defaultIndex);
</script>
  
</div>
